name: Semantic release [composite]
description: >
  Sets up Node.js, installs dependencies, and runs semantic-release against
  the given branch. Overrides GITHUB_REF/GITHUB_REF_NAME at runtime so
  workflow_run-triggered invocations release from the triggering branch
  rather than the runner default.

inputs:
  target_ref:
    description: Branch name semantic-release should release from.
    required: true
  stable_ref:
    description: >
      Stable branch name. When target_ref matches this value the full plugin
      set runs (including changelog generation and the release commit back to
      the repo). For any other branch (pre-releases) the changelog/git plugins
      are stripped so only the tag and GitHub Release are produced.
    required: false
    default: main
  github_token:
    description: Token with permissions to push tags, commits, and create releases.
    required: true
  node_version:
    description: Node.js version passed to actions/setup-node.
    required: false
    default: "lts/*"

runs:
  using: composite
  steps:
    # ----------------- Setup -----------------
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    # ----------------- Pre-release plugin trim -----------------
    # On pre-release branches we still want a tag and a GitHub Release, but
    # not a CHANGELOG.md update nor a release commit back to the repo. Strip
    # `@semantic-release/changelog` and `@semantic-release/git` from the
    # resolved config before invoking semantic-release.
    - name: Strip changelog plugins for pre-releases
      if: inputs.target_ref != inputs.stable_ref
      shell: bash
      env:
        TARGET_REF: ${{ inputs.target_ref }}
      run: |
        jq '.plugins |= map(select(
              (type != "array") or
              (.[0] != "@semantic-release/changelog" and .[0] != "@semantic-release/git")
            ))' .releaserc.json > .releaserc.runtime.json
        mv .releaserc.runtime.json .releaserc.json
        echo "Pre-release on '${TARGET_REF}': changelog/git plugins disabled."

    # ----------------- Release -----------------
    - name: Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        TARGET_REF: ${{ inputs.target_ref }}
      # `workflow_run`-triggered runs execute in the default branch's
      # context, so the runner pre-populates GITHUB_REF / GITHUB_REF_NAME
      # with the default branch. Those are among the "default" env vars
      # the runner re-asserts after the step's `env:` block, so declaring
      # them in `env:` does not stick — `env-ci` ends up reading `main`
      # regardless of which branch actually triggered the release.
      # `export` inside `run:` happens after the runner injection, so the
      # values are actually visible to child processes.
      run: |
        export GITHUB_REF="refs/heads/${TARGET_REF}"
        export GITHUB_REF_NAME="${TARGET_REF}"
        echo "Releasing from branch: ${GITHUB_REF_NAME} (GITHUB_REF=${GITHUB_REF})"
        npx semantic-release
