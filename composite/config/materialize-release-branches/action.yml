name: Materialize release branches [composite]
description: >
  Creates local refs for every release branch tracked by semantic-release,
  except the currently checked-out one. Required because semantic-release
  runs `git tag --merged <branch>` against every branch in .releaserc.json
  and those invocations need a local ref.

inputs:
  current_ref:
    description: Branch name currently checked out (skipped from materialization).
    required: true
  release_branches:
    description: Space-separated list of release branch names to materialize.
    required: false
    default: "main dev stg prd"

runs:
  using: composite
  steps:
    - name: Materialize local release branches
      shell: bash
      env:
        CURRENT_REF: ${{ inputs.current_ref }}
        RELEASE_BRANCHES: ${{ inputs.release_branches }}
      run: |
        set -euo pipefail
        # `git branch -f` refuses to update the branch currently in use
        # by the worktree, so the active ref is skipped.
        for b in $RELEASE_BRANCHES; do
          if [ "$b" = "$CURRENT_REF" ]; then
            continue
          fi
          if git show-ref --verify --quiet "refs/remotes/origin/$b"; then
            git branch -f "$b" "origin/$b"
          fi
        done
