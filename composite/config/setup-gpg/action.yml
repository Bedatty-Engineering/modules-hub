name: Setup GPG signing [composite]
description: >
  Imports a GPG private key, pre-caches the passphrase in gpg-agent,
  and configures git to sign all commits and tags automatically.

inputs:
  gpg_private_key:
    description: Armored GPG private key (output of gpg --armor --export-secret-keys).
    required: true
  gpg_passphrase:
    description: Passphrase for the GPG private key. Leave empty if the key has none.
    required: false
    default: ""
  git_identity_token:
    description: >
      Optional. Token with user read access (e.g. PAT). When set, configures git user.name
      and user.email from the GitHub API user behind this token (same as gh api user).
    required: false
    default: ""

outputs:
  key_id:
    description: Long key ID of the imported secret key.
    value: ${{ steps.import.outputs.key_id }}

runs:
  using: composite
  steps:
    - name: Import key and configure signing
      id: import
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg_private_key }}
        GPG_PASSPHRASE: ${{ inputs.gpg_passphrase }}
      run: |
        set -euo pipefail

        # Ensure gpg dir exists
        mkdir -p ~/.gnupg && chmod 700 ~/.gnupg

        # Force loopback pinentry for every gpg invocation (including those
        # spawned by git commit -S / git tag -s). Without this, gpg-agent
        # can block on a missing pinentry and hang the step indefinitely.
        {
          echo 'pinentry-mode loopback'
          echo 'batch'
        } > ~/.gnupg/gpg.conf

        {
          echo 'allow-loopback-pinentry'
          echo 'default-cache-ttl 7200'
          echo 'max-cache-ttl 7200'
        } > ~/.gnupg/gpg-agent.conf

        gpgconf --kill gpg-agent || true

        # Import private key
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import

        # Resolve the long key ID from the imported secret key
        KEY_ID=$(gpg --list-secret-keys --keyid-format=long \
          | awk '/^sec/{split($2,a,"/"); print a[2]; exit}')

        # Pre-cache passphrase by signing real content. Signing /dev/null is
        # a no-op on some gpg versions and does not populate the agent cache.
        echo "cache" \
          | gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --local-user "$KEY_ID" --clearsign > /dev/null

        # Configure git signing (global so every git invocation inherits it,
        # including those from @semantic-release/git which change cwd).
        # Intentionally do NOT set `tag.gpgsign = true`: semantic-release
        # creates lightweight tags via `git tag <name> <sha>` (no -m). With
        # `tag.gpgsign` enabled, git would promote it to a signed annotated
        # tag, require a message, and open $EDITOR (vi) on the runner —
        # hanging the release step indefinitely.
        git config --global user.signingkey "$KEY_ID"
        git config --global commit.gpgsign true
        git config --global gpg.program gpg

        echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

    - name: Configure git user from GitHub token
      if: ${{ inputs.git_identity_token != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.git_identity_token }}
      run: |
        set -euo pipefail
        LOGIN=$(gh api user --jq .login)
        EMAIL=$(gh api user --jq '.email // empty')
        EMAIL="${EMAIL:-${LOGIN}@users.noreply.github.com}"
        git config --global user.name  "$LOGIN"
        git config --global user.email "$EMAIL"

        # Override semantic-release-bot defaults used by @semantic-release/git
        {
          echo "GIT_AUTHOR_NAME=$LOGIN"
          echo "GIT_AUTHOR_EMAIL=$EMAIL"
          echo "GIT_COMMITTER_NAME=$LOGIN"
          echo "GIT_COMMITTER_EMAIL=$EMAIL"
        } >> "$GITHUB_ENV"
