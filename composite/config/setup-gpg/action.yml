name: Setup GPG signing [composite]
description: >
  Imports a GPG private key, pre-caches the passphrase in gpg-agent,
  and configures git to sign all commits and tags automatically.

inputs:
  gpg_private_key:
    description: Armored GPG private key (output of gpg --armor --export-secret-keys).
    required: true
  gpg_passphrase:
    description: Passphrase for the GPG private key. Leave empty if the key has none.
    required: false
    default: ""
  git_identity_token:
    description: >
      Optional. Token with user read access (e.g. PAT). When set, configures git user.name
      and user.email from the GitHub API user behind this token (same as gh api user).
    required: false
    default: ""

outputs:
  key_id:
    description: Long key ID of the imported secret key.
    value: ${{ steps.import.outputs.key_id }}

runs:
  using: composite
  steps:
    - name: Import key and configure signing
      id: import
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg_private_key }}
        GPG_PASSPHRASE: ${{ inputs.gpg_passphrase }}
      run: |
        set -euo pipefail

        # Import private key
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import

        # Allow passphrase via loopback so gpg-agent doesn't prompt interactively
        mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
        echo 'allow-loopback-pinentry' >> ~/.gnupg/gpg-agent.conf
        gpgconf --kill gpg-agent

        # Resolve the long key ID from the imported secret key
        KEY_ID=$(gpg --list-secret-keys --keyid-format=long \
          | awk '/^sec/{split($2,a,"/"); print a[2]; exit}')

        # Pre-cache passphrase with a dummy sign so git never gets a prompt
        printf '%s' "$GPG_PASSPHRASE" \
          | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback \
                --local-user "$KEY_ID" --sign --output /dev/null /dev/null 2>/dev/null

        # Configure git signing
        git config user.signingkey "$KEY_ID"
        git config commit.gpgsign true
        git config tag.gpgsign true

        echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

    - name: Configure git user from GitHub token
      if: ${{ inputs.git_identity_token != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.git_identity_token }}
      run: |
        set -euo pipefail
        LOGIN=$(gh api user --jq .login)
        EMAIL=$(gh api user --jq '.email // empty')
        EMAIL="${EMAIL:-${LOGIN}@users.noreply.github.com}"
        git config user.name  "$LOGIN"
        git config user.email "$EMAIL"

        # Override semantic-release-bot defaults used by @semantic-release/git
        {
          echo "GIT_AUTHOR_NAME=$LOGIN"
          echo "GIT_AUTHOR_EMAIL=$EMAIL"
          echo "GIT_COMMITTER_NAME=$LOGIN"
          echo "GIT_COMMITTER_EMAIL=$EMAIL"
        } >> "$GITHUB_ENV"
