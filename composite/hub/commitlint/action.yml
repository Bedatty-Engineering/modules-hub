name: Lint commit messages [composite]
description: >
  Sets up Node.js, installs npm dependencies, and runs commitlint
  on the commit range of a pull request.

inputs:
  pr-base-sha:
    description: PR base branch SHA (github.event.pull_request.base.sha).
    required: true
  pr-head-sha:
    description: PR head commit SHA (github.event.pull_request.head.sha).
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "lts/*"
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Lint commits
      shell: bash
      env:
        PR_BASE_SHA: ${{ inputs.pr-base-sha }}
        PR_HEAD_SHA: ${{ inputs.pr-head-sha }}
      run: |
        set -euo pipefail
        BASE=$(git merge-base "$PR_BASE_SHA" "$PR_HEAD_SHA")
        echo "Linting commit range: ${BASE}..${PR_HEAD_SHA}"
        npx commitlint \
          --from "${BASE}" \
          --to   "${PR_HEAD_SHA}" \
          --verbose
