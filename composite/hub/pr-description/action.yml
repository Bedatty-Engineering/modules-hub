name: Validate PR description [composite]
description: >
  Ensures the pull request body has substance — not empty, not only HTML
  comments / template scaffolding.

inputs:
  pr-body:
    description: PR body text to validate.
    required: false
    default: ${{ github.event.pull_request.body }}
  min-length:
    description: >
      Minimum number of non-whitespace characters after stripping HTML
      comments and markdown headings.
    required: false
    default: "20"

outputs:
  outcome:
    description: success | failure
    value: ${{ steps.validate.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Validate description
      id: validate
      shell: bash
      env:
        PR_BODY: ${{ inputs.pr-body }}
        MIN_LENGTH: ${{ inputs.min-length }}
      run: |
        set -euo pipefail

        body="$PR_BODY"
        if [ -z "$body" ]; then
          echo "::error::PR body is empty"
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        # Strip HTML comments (<!-- ... -->), markdown headings, list bullets
        # and unchecked task boxes; whatever's left is "real" content.
        stripped=$(printf '%s' "$body" \
          | perl -0777 -pe 's/<!--.*?-->//gs' \
          | sed -E -e 's/^[[:space:]]*#+[[:space:]].*$//' \
                   -e 's/^[[:space:]]*[-*][[:space:]]+\[[ xX]\][[:space:]]*$//' \
                   -e 's/^[[:space:]]*[-*][[:space:]]*$//')

        compact=$(printf '%s' "$stripped" | tr -d '[:space:]')
        length=${#compact}

        if [ "$length" -lt "$MIN_LENGTH" ]; then
          echo "::error::PR description has only $length meaningful chars (min: $MIN_LENGTH)"
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        echo "PR description OK ($length chars of substance)"
        echo "outcome=success" >> "$GITHUB_OUTPUT"
