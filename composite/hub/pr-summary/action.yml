name: PR validation summary [composite]
description: >
  Posts (or updates) a sticky PR comment with a validation status table.
  Supports two phases: the default phase posts the hygiene table immediately;
  findings-only mode (run after all jobs complete) updates the same comment
  with a collapsible findings section sourced from the GitHub Annotations API.

inputs:
  github-token:
    description: "Token with `pull-requests: write`."
    required: false
    default: ${{ github.token }}
  title-result:
    description: Outcome of the PR title check.
    required: false
    default: "skipped"
  title-message:
    description: Error message from the PR title check (when failed).
    required: false
    default: ""
  description-result:
    description: Outcome of the PR description check.
    required: false
    default: "skipped"
  description-message:
    description: Error message from the PR description check (when failed).
    required: false
    default: ""
  source-branch-result:
    description: Outcome of the source-branch check.
    required: false
    default: "skipped"
  source-branch-message:
    description: Error message from the source-branch check (when failed).
    required: false
    default: ""
  size-result:
    description: Outcome of the size check.
    required: false
    default: "skipped"
  size-message:
    description: Error message from the size check (when failed).
    required: false
    default: ""
  label-result:
    description: Outcome of the auto-label check.
    required: false
    default: "skipped"
  label-message:
    description: Error message from the auto-label check (when failed).
    required: false
    default: ""
  assignee-result:
    description: Outcome of the auto-assign check.
    required: false
    default: "skipped"
  assignee-message:
    description: Error message from the auto-assign check (when failed).
    required: false
    default: ""
  findings-only:
    description: >
      When true, skip posting the table and only update the findings section
      of the existing sticky comment. Use in a second job that runs after all
      checks complete so findings from every job are captured.
    required: false
    default: "false"
  post-comment:
    description: Whether to post / update the sticky comment.
    required: false
    default: "true"
  marker:
    description: HTML marker used to locate the existing sticky comment.
    required: false
    default: "<!-- pr-validation-summary -->"

outputs:
  overall:
    description: success | failure (failure if any check failed)
    value: ${{ steps.summary.outputs.overall }}

runs:
  using: composite
  steps:
    - name: Build summary
      id: summary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        TITLE: ${{ inputs.title-result }}
        TITLE_MSG: ${{ inputs.title-message }}
        DESCRIPTION: ${{ inputs.description-result }}
        DESCRIPTION_MSG: ${{ inputs.description-message }}
        SOURCE: ${{ inputs.source-branch-result }}
        SOURCE_MSG: ${{ inputs.source-branch-message }}
        SIZE: ${{ inputs.size-result }}
        SIZE_MSG: ${{ inputs.size-message }}
        LABEL: ${{ inputs.label-result }}
        LABEL_MSG: ${{ inputs.label-message }}
        ASSIGNEE: ${{ inputs.assignee-result }}
        ASSIGNEE_MSG: ${{ inputs.assignee-message }}
        FINDINGS_ONLY: ${{ inputs.findings-only }}
        POST: ${{ inputs.post-comment }}
        MARKER: ${{ inputs.marker }}
      run: |
        set -euo pipefail

        # ── helpers ────────────────────────────────────────────────────────────
        icon() {
          case "$1" in
            success) printf '✅' ;;
            failure) printf '❌' ;;
            skipped) printf '⚪' ;;
            *)       printf '❔' ;;
          esac
        }

        find_comment() {
          gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | head -n1 || true
        }

        # Fetch annotations for every completed job in the run, excluding the
        # summary and findings jobs themselves (they never emit annotations).
        fetch_findings() {
          local block="$1"
          local jq_jobs
          jq_jobs='.jobs[] | select(.status == "completed")'
          jq_jobs+=' | select(.name | test("PR (summary|findings)") | not)'
          jq_jobs+=' | [(.id | tostring), .name] | @tsv'

          local jq_fmt
          jq_fmt='.[] |
            select(.message | test("Please specify an on.push hook") | not) |
            (if .annotation_level == "failure" then "ERROR"
             elif .annotation_level == "warning" then "WARNING"
             else (.annotation_level | ascii_upcase) end) as $lvl |
            "[" + $lvl + "] \(.path):\(.start_line) — \(.message)"'

          while IFS=$'\t' read -r job_id job_name; do
            local ann
            ann=$(gh api "repos/$REPO/check-runs/$job_id/annotations" \
              --paginate --jq '.' 2>/dev/null || echo "[]")
            ann=$(printf '%s' "$ann" | jq '[
              .[] | select(.message | test("Please specify an on.push hook") | not)
            ]')
            local count
            count=$(printf '%s' "$ann" | jq 'length')
            [ "$count" -eq 0 ] && continue

            local has_error has_warn level_icon
            has_error=$(printf '%s' "$ann" | jq -r 'any(.[]; .annotation_level == "failure")')
            has_warn=$(printf '%s' "$ann" | jq -r 'any(.[]; .annotation_level == "warning")')
            if [ "$has_error" = "true" ]; then level_icon="❌"
            elif [ "$has_warn" = "true" ];  then level_icon="⚠️"
            else                                  level_icon="🔵"
            fi

            {
              echo "<details>"
              echo "<summary>$level_icon <strong>$job_name</strong>: $count finding(s) — expand to review</summary>"
              echo
              echo '```'
              printf '%s' "$ann" | jq -r "$jq_fmt"
              echo '```'
              echo
              echo "</details>"
            } >> "$block"
          done < <(
            gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
              --paginate --jq "$jq_jobs" 2>/dev/null || true
          )
        }

        # ── Phase 2: findings-only update ─────────────────────────────────────
        if [ "${FINDINGS_ONLY,,}" = "true" ]; then
          if [ -z "${PR_NUMBER:-}" ] || [ -z "${RUN_ID:-}" ]; then
            echo "No PR context; skipping findings update."
            exit 0
          fi

          existing_id=$(find_comment)
          if [ -z "$existing_id" ]; then
            echo "No existing summary comment found; skipping findings update."
            exit 0
          fi

          findings_block=$(mktemp)
          fetch_findings "$findings_block"

          if [ -s "$findings_block" ]; then
            # Strip the old findings section (everything from the '---' separator
            # onwards) then append freshly fetched findings.
            existing_body=$(gh api \
              "repos/$REPO/issues/comments/$existing_id" --jq '.body')
            base_body=$(printf '%s' "$existing_body" \
              | awk '/^---$/{exit} {print}')

            comment_file=$(mktemp)
            {
              echo "$MARKER"
              printf '%s\n' "$base_body"
              echo
              echo "---"
              echo
              echo "### 🔍 Findings"
              echo
              cat "$findings_block"
            } > "$comment_file"

            gh api -X PATCH "repos/$REPO/issues/comments/$existing_id" \
              -F body=@"$comment_file" >/dev/null
            echo "Updated comment with findings."
            rm -f "$comment_file"
          else
            echo "No findings to report."
          fi

          rm -f "$findings_block"
          exit 0
        fi

        # ── Phase 1: post hygiene table ────────────────────────────────────────
        overall="success"
        for r in "$TITLE" "$DESCRIPTION" "$SOURCE" "$SIZE" "$LABEL" "$ASSIGNEE"; do
          [ "$r" = "failure" ] && overall="failure"
        done

        overall_block=$(mktemp)
        if [ "$overall" = "success" ]; then
          echo "**Overall:** $(icon "$overall") \`$overall\`" > "$overall_block"
        else
          {
            echo "<details>"
            overall_icon=$(icon "$overall")
            sum_open="<summary><strong>Overall:</strong> $overall_icon <code>$overall</code>"
            echo "$sum_open — expand for error details</summary>"
            echo
            print_err() {
              local label="$1" outcome="$2" msg="$3"
              if [ "$outcome" = "failure" ]; then
                if [ -n "$msg" ]; then
                  echo "- **$label**: $msg"
                else
                  echo "- **$label**: (no error message captured)"
                fi
              fi
            }
            print_err "PR title"       "$TITLE"       "$TITLE_MSG"
            print_err "PR description" "$DESCRIPTION" "$DESCRIPTION_MSG"
            print_err "Source branch"  "$SOURCE"      "$SOURCE_MSG"
            print_err "Size"           "$SIZE"        "$SIZE_MSG"
            print_err "Auto-label"     "$LABEL"       "$LABEL_MSG"
            print_err "Assignee"       "$ASSIGNEE"    "$ASSIGNEE_MSG"
            echo
            echo "</details>"
          } > "$overall_block"
        fi

        body_file=$(mktemp)
        {
          echo "## PR Validation Summary"
          echo
          echo "| Check | Result |"
          echo "|---|---|"
          echo "| PR title | $(icon "$TITLE") \`$TITLE\` |"
          echo "| PR description | $(icon "$DESCRIPTION") \`$DESCRIPTION\` |"
          echo "| Source branch | $(icon "$SOURCE") \`$SOURCE\` |"
          echo "| Size | $(icon "$SIZE") \`$SIZE\` |"
          echo "| Auto-label | $(icon "$LABEL") \`$LABEL\` |"
          echo "| Assignee | $(icon "$ASSIGNEE") \`$ASSIGNEE\` |"
          echo
          cat "$overall_block"
        } > "$body_file"
        rm -f "$overall_block"

        cat "$body_file" >> "$GITHUB_STEP_SUMMARY"

        comment_file=$(mktemp)
        { echo "$MARKER"; cat "$body_file"; } > "$comment_file"

        echo "overall=$overall" >> "$GITHUB_OUTPUT"

        if [ "${POST,,}" != "true" ] || [ -z "${PR_NUMBER:-}" ]; then
          exit 0
        fi

        existing_id=$(find_comment)
        if [ -n "$existing_id" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$existing_id" \
            -F body=@"$comment_file" >/dev/null
          echo "Updated existing summary comment ($existing_id)."
        else
          gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" \
            -F body=@"$comment_file" >/dev/null
          echo "Posted new summary comment."
        fi
        rm -f "$body_file" "$comment_file"
