name: PR validation summary [composite]
description: >
  Aggregates the outcomes of upstream validation steps and posts (or
  updates) a sticky comment on the pull request with a status table.
  Any job in the workflow run that emits ::warning/::error annotations
  will be automatically surfaced as a collapsible findings section,
  grouped per job.

inputs:
  github-token:
    description: "Token with `pull-requests: write`."
    required: false
    default: ${{ github.token }}
  title-result:
    description: Outcome of the PR title check.
    required: false
    default: "skipped"
  title-message:
    description: Error message from the PR title check (when failed).
    required: false
    default: ""
  description-result:
    description: Outcome of the PR description check.
    required: false
    default: "skipped"
  description-message:
    description: Error message from the PR description check (when failed).
    required: false
    default: ""
  source-branch-result:
    description: Outcome of the source-branch check.
    required: false
    default: "skipped"
  source-branch-message:
    description: Error message from the source-branch check (when failed).
    required: false
    default: ""
  size-result:
    description: Outcome of the size check.
    required: false
    default: "skipped"
  size-message:
    description: Error message from the size check (when failed).
    required: false
    default: ""
  label-result:
    description: Outcome of the auto-label check.
    required: false
    default: "skipped"
  label-message:
    description: Error message from the auto-label check (when failed).
    required: false
    default: ""
  assignee-result:
    description: Outcome of the auto-assign check.
    required: false
    default: "skipped"
  assignee-message:
    description: Error message from the auto-assign check (when failed).
    required: false
    default: ""
  codeql-result:
    description: Outcome of the CodeQL job (success/failure/skipped).
    required: false
    default: "skipped"
  post-comment:
    description: Whether to post / update the sticky comment.
    required: false
    default: "true"
  marker:
    description: HTML marker used to locate the existing sticky comment.
    required: false
    default: "<!-- pr-validation-summary -->"

outputs:
  overall:
    description: success | failure (failure if any check failed)
    value: ${{ steps.summary.outputs.overall }}

runs:
  using: composite
  steps:
    - name: Build summary
      id: summary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        TITLE: ${{ inputs.title-result }}
        TITLE_MSG: ${{ inputs.title-message }}
        DESCRIPTION: ${{ inputs.description-result }}
        DESCRIPTION_MSG: ${{ inputs.description-message }}
        SOURCE: ${{ inputs.source-branch-result }}
        SOURCE_MSG: ${{ inputs.source-branch-message }}
        SIZE: ${{ inputs.size-result }}
        SIZE_MSG: ${{ inputs.size-message }}
        LABEL: ${{ inputs.label-result }}
        LABEL_MSG: ${{ inputs.label-message }}
        ASSIGNEE: ${{ inputs.assignee-result }}
        ASSIGNEE_MSG: ${{ inputs.assignee-message }}
        CODEQL: ${{ inputs.codeql-result }}
        POST: ${{ inputs.post-comment }}
        MARKER: ${{ inputs.marker }}
      run: |
        set -euo pipefail

        icon() {
          case "$1" in
            success) printf '✅' ;;
            failure) printf '❌' ;;
            skipped) printf '⚪' ;;
            *)       printf '❔' ;;
          esac
        }

        overall="success"
        for r in "$TITLE" "$DESCRIPTION" "$SOURCE" "$SIZE" "$LABEL" "$ASSIGNEE" "$CODEQL"; do
          [ "$r" = "failure" ] && overall="failure"
        done

        # Build the overall block: a single-line success or a <details>
        # dropdown when any check failed.
        overall_block=$(mktemp)
        if [ "$overall" = "success" ]; then
          echo "**Overall:** $(icon "$overall") \`$overall\`" > "$overall_block"
        else
          {
            echo "<details>"
            overall_icon=$(icon "$overall")
            sum_open="<summary><strong>Overall:</strong> $overall_icon <code>$overall</code>"
            echo "$sum_open — expand for error details</summary>"
            echo
            # Emit one bullet per failing check with the captured message.
            print_err() {
              local label="$1" outcome="$2" msg="$3"
              if [ "$outcome" = "failure" ]; then
                if [ -n "$msg" ]; then
                  echo "- **$label**: $msg"
                else
                  echo "- **$label**: (no error message captured)"
                fi
              fi
            }
            print_err "PR title"        "$TITLE"       "$TITLE_MSG"
            print_err "PR description"  "$DESCRIPTION" "$DESCRIPTION_MSG"
            print_err "Source branch"   "$SOURCE"      "$SOURCE_MSG"
            print_err "Size"            "$SIZE"        "$SIZE_MSG"
            print_err "Auto-label"      "$LABEL"       "$LABEL_MSG"
            print_err "Assignee"        "$ASSIGNEE"    "$ASSIGNEE_MSG"
            print_err "CodeQL"          "$CODEQL"      "CodeQL analysis failed — check the workflow run for details"
            echo
            echo "</details>"
          } > "$overall_block"
        fi

        body_file=$(mktemp)
        {
          echo "## PR Validation Summary"
          echo
          echo "| Check | Result |"
          echo "|---|---|"
          echo "| PR title | $(icon "$TITLE") \`$TITLE\` |"
          echo "| PR description | $(icon "$DESCRIPTION") \`$DESCRIPTION\` |"
          echo "| Source branch | $(icon "$SOURCE") \`$SOURCE\` |"
          echo "| Size | $(icon "$SIZE") \`$SIZE\` |"
          echo "| Auto-label | $(icon "$LABEL") \`$LABEL\` |"
          echo "| Assignee | $(icon "$ASSIGNEE") \`$ASSIGNEE\` |"
          echo "| CodeQL | $(icon "$CODEQL") \`$CODEQL\` |"
          echo
          cat "$overall_block"
        } > "$body_file"
        rm -f "$overall_block"

        # Generic findings — iterate every completed job in this workflow run,
        # fetch its GitHub Check Run annotations, and render a collapsible
        # block per job. Any step that emits ::warning/::error automatically
        # appears here without requiring changes to the individual jobs.
        if [ -n "${PR_NUMBER:-}" ] && [ -n "${RUN_ID:-}" ]; then
          findings_block=$(mktemp)

          finding_icon() {
            case "$1" in
              warning) printf '⚠️' ;;
              failure) printf '❌' ;;
              *)       printf '🔵' ;;
            esac
          }

          while IFS=$'\t' read -r job_id job_name; do
            annotations=$(gh api \
              "repos/$REPO/check-runs/$job_id/annotations" \
              --paginate --jq '.' 2>/dev/null || echo "[]")
            count=$(printf '%s' "$annotations" | jq 'length')
            [ "$count" -eq 0 ] && continue
            # pick the worst level present to show in the summary line
            has_error=$(printf '%s' "$annotations" | jq -r 'any(.[]; .annotation_level == "failure")')
            has_warn=$(printf '%s' "$annotations" | jq -r 'any(.[]; .annotation_level == "warning")')
            if [ "$has_error" = "true" ]; then
              level_icon="❌"
            elif [ "$has_warn" = "true" ]; then
              level_icon="⚠️"
            else
              level_icon="🔵"
            fi
            {
              echo "<details>"
              echo "<summary>$level_icon <strong>$job_name</strong>: $count finding(s) — expand to review</summary>"
              echo
              echo '```'
              jq_fmt='.[] |
                (if .annotation_level == "failure" then "ERROR"
                 elif .annotation_level == "warning" then "WARNING"
                 else (.annotation_level | ascii_upcase) end) as $lvl |
                "[" + $lvl + "] \(.path):\(.start_line) — \(.message)"'
              printf '%s' "$annotations" | jq -r "$jq_fmt"
              echo '```'
              echo
              echo "</details>"
            } >> "$findings_block"
          done < <(
            gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
              --paginate --jq \
              '.jobs[] | select(.status == "completed") | [(.id | tostring), .name] | @tsv' \
              2>/dev/null || true
          )
          if [ -s "$findings_block" ]; then
            {
              echo
              echo "---"
              echo
              echo "### 🔍 Findings"
              echo
            } >> "$body_file"
            cat "$findings_block" >> "$body_file"
          fi
          rm -f "$findings_block"
        fi

        # Step summary is the table without the marker.
        cat "$body_file" >> "$GITHUB_STEP_SUMMARY"

        # PR comment prepends the marker so the next run can find it.
        comment_file=$(mktemp)
        { echo "$MARKER"; cat "$body_file"; } > "$comment_file"

        echo "overall=$overall" >> "$GITHUB_OUTPUT"

        if [ "${POST,,}" != "true" ] || [ -z "${PR_NUMBER:-}" ]; then
          exit 0
        fi

        # Find existing sticky comment by marker, then PATCH or POST.
        existing_id=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
          | head -n1 || true)

        if [ -n "$existing_id" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$existing_id" \
            -F body=@"$comment_file" >/dev/null
          echo "Updated existing summary comment ($existing_id)."
        else
          gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" \
            -F body=@"$comment_file" >/dev/null
          echo "Posted new summary comment."
        fi
        rm -f "$body_file" "$comment_file"
