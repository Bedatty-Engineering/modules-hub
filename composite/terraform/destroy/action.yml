name: Terraform destroy (directory)
description: Init and destroy in a Terraform root module. Requires Terraform on PATH (run setup composite first).

inputs:
  working_directory:
    description: Path to the Terraform root module.
    required: true
  auto_approve:
    description: Pass -auto-approve to destroy.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init -input=false -upgrade

    - name: Terraform destroy
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        if [ "${{ inputs.auto_approve }}" = "true" ]; then
          terraform destroy -auto-approve -input=false -no-color
        else
          terraform destroy -input=false -no-color
        fi
