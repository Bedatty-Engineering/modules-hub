name: Mask Terraform Cloudflare-related secrets
description: Registers optional secret values with the runner log masker (no values printed).

secrets:
  TF_API_TOKEN:
    description: Terraform Cloud / HCP token
    required: false
  CLOUDFLARE_API_TOKEN:
    required: false
  CLOUDFLARE_ACCOUNT_ID:
    required: false
  CLOUDFLARE_ZONE_ID:
    required: false

runs:
  using: composite
  steps:
    - name: Add masks
      shell: bash
      env:
        TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      run: |
        set -euo pipefail
        for name in TF_API_TOKEN CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_ZONE_ID; do
          val="${!name:-}"
          if [ -n "$val" ]; then
            echo "::add-mask::$val"
          fi
        done
