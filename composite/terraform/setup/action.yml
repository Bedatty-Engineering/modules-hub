name: Setup Terraform [composite]
description: Install a pinned Terraform CLI version.

inputs:
  terraform_version:
    required: false
    default: "1.7.5"

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
