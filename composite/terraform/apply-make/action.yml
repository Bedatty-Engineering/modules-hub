name: Terraform apply via Makefile [composite]
description: Runs make apply-auto STACK=<stack> (non-interactive).

inputs:
  stack:
    required: true

runs:
  using: composite
  steps:
    - name: make apply-auto
      shell: bash
      env:
        STACK: ${{ inputs.stack }}
      run: make apply-auto "STACK=$STACK"
