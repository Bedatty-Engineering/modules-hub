# yamllint disable rule:line-length
name: Validate modules-hub [Reusable]

# Repository-specific validation reusable workflow for the modules-hub
# project. Covers checks that don't generalize to other repos: presence of
# the semantic-release config, pinning rules for first-party composites,
# and README parity for each composite directory.

on:
  workflow_call: {}

jobs:
  # ----------------- Release Config -----------------
  release-config:
    name: Verify release config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify release config
        uses: Bedatty-Engineering/modules-hub/composite/hub/verify-release-config@v1

  # ----------------- Changed Files Detection (composite scope) -----------------
  changed-files:
    name: Detect changed composite files
    runs-on: ubuntu-latest
    outputs:
      action_files: ${{ steps.detect.outputs.action_all_all_changed_files }}
      composite_dirs: ${{ steps.detect.outputs.composite_dirs_all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            action_all:
              - 'composite/**/action.yml'
            composite_dirs:
              - 'composite/**/action.yml'
              - 'composite/**/README.md'
          dir_names: false

      - name: Summarize detection
        run: |
          echo "action_all=${{ steps.detect.outputs.action_all_all_changed_files }}"
          echo "composite_dirs=${{ steps.detect.outputs.composite_dirs_all_changed_files }}"

  # ----------------- Pinned Actions Check -----------------
  # Every `uses:` in a composite action.yml must be either a local repo
  # composite pinned to a tag (Bedatty-Engineering/modules-hub/...@vN)
  # or a third-party action pinned to a 40-char SHA. Anything else fails.
  pinned-actions:
    name: Pinned actions check
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.action_files != ''
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify SHA / tag pinning
        uses: Bedatty-Engineering/modules-hub/composite/hub/verify-composite-pinning@v1
        with:
          files: ${{ needs.changed-files.outputs.action_files }}

  # ----------------- README Check -----------------
  # Every composite touched by the PR must keep a README.md alongside its
  # action.yml. Catches new composites shipped without docs.
  readme-check:
    name: Composite README check
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.composite_dirs != ''
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify README exists for changed composites
        uses: Bedatty-Engineering/modules-hub/composite/hub/verify-composite-readmes@v1
        with:
          files: ${{ needs.changed-files.outputs.composite_dirs }}
