name: Terraform Plan [Reusable]

on:
  workflow_call:
    inputs:
      terraform_version:
        type: string
        default: "1.7.5"
      stacks_dir:
        type: string
        default: stacks
      modules_dir:
        type: string
        default: modules
      environment_prefix:
        type: string
        default: website-
      concurrency_group:
        type: string
        default: ""
      post_plan_comment:
        type: boolean
        default: true
      use_makefile:
        type: boolean
        default: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TF_CLI_ARGS: "-no-color"

jobs:
  detect-changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.changed.outputs.stacks }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect stacks
        id: changed
        uses: Bedatty-Engineering/modules-hub/composite/terraform/detect-stacks@v1
        with:
          stacks_dir: ${{ inputs.stacks_dir }}
          modules_dir: ${{ inputs.modules_dir }}
          range_mode: pr
          pr_base_sha: ${{ github.event.pull_request.base.sha }}
          pr_head_sha: ${{ github.sha }}

  plan:
    name: Plan · ${{ matrix.stack }}
    needs: detect-changes
    if: needs.detect-changes.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_prefix }}${{ matrix.stack }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-changes.outputs.stacks) }}
    concurrency:
      group: terraform-plan-${{ inputs.concurrency_group != '' && inputs.concurrency_group || github.run_id }}-${{ matrix.stack }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Mask secrets
        uses: Bedatty-Engineering/modules-hub/composite/terraform/mask-secrets@v1

      - name: Setup Terraform
        uses: Bedatty-Engineering/modules-hub/composite/terraform/setup@v1
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Verify Terraform Cloud token
        uses: Bedatty-Engineering/modules-hub/composite/terraform/verify-tfc-token@v1
        with:
          environment_label: ${{ inputs.environment_prefix }}${{ matrix.stack }}

      - name: Init (Makefile)
        if: inputs.use_makefile == true
        uses: Bedatty-Engineering/modules-hub/composite/terraform/init-make@v1
        with:
          stack: ${{ matrix.stack }}

      - name: Validate (Makefile)
        if: inputs.use_makefile == true
        uses: Bedatty-Engineering/modules-hub/composite/terraform/validate-make@v1
        with:
          stack: ${{ matrix.stack }}

      - name: Plan (Makefile)
        id: plan_make
        if: inputs.use_makefile == true
        uses: Bedatty-Engineering/modules-hub/composite/terraform/plan-make@v1
        with:
          stack: ${{ matrix.stack }}
          plan_output_file: plan-output.txt
        continue-on-error: true

      - name: Plan (directory)
        id: plan_direct
        if: inputs.use_makefile == false
        uses: Bedatty-Engineering/modules-hub/composite/terraform/plan@v1
        with:
          working_directory: ${{ inputs.stacks_dir }}/${{ matrix.stack }}
          plan_file: plan-output.txt
        continue-on-error: true

      - name: Post plan to PR
        if: always() && inputs.post_plan_comment == true && github.event_name == 'pull_request'
        uses: Bedatty-Engineering/modules-hub/composite/terraform/post-plan-comment@v1
        continue-on-error: true
        with:
          plan_outcome: ${{ steps.plan_make.outcome != 'skipped' && steps.plan_make.outcome || steps.plan_direct.outcome }}
          stack_name: ${{ matrix.stack }}
          plan_file: plan-output.txt

      - name: Fail if plan failed
        if: steps.plan_make.outcome == 'failure' || steps.plan_direct.outcome == 'failure'
        run: exit 1
