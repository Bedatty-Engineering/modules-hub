name: Release [Reusable]

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or ref to release from"
        required: true
        type: string
    secrets:
      RELEASE_TOKEN:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Materialize local release branches
        shell: bash
        env:
          TARGET_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          # semantic-release iterates over every branch declared in
          # .releaserc.json running `git tag --merged <name>`, which requires
          # a local ref. actions/checkout only materializes the target branch;
          # create locals for every OTHER release branch that exists on
          # origin. The currently checked-out branch is skipped because
          # `git branch -f` refuses to update the branch in use by the worktree.
          for b in main dev stg prd; do
            if [ "$b" = "$TARGET_REF" ]; then
              continue
            fi
            if git show-ref --verify --quiet "refs/remotes/origin/$b"; then
              git branch -f "$b" "origin/$b"
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup GPG signing
        uses: Bedatty-Engineering/modules-hub/composite/config/setup-gpg@dev
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_identity_token: ${{ secrets.RELEASE_TOKEN }}

      - name: Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TARGET_REF: ${{ inputs.ref }}
        # `workflow_run`-triggered runs execute in the default branch's
        # context, so the runner pre-populates GITHUB_REF / GITHUB_REF_NAME
        # with the default branch. Those are among the "default" env vars
        # the runner re-asserts after the step's `env:` block, so declaring
        # them in `env:` does not stick — `env-ci` ends up reading `main`
        # regardless of which branch actually triggered the release.
        # `export` inside `run:` happens after the runner injection, so the
        # values are actually visible to child processes.
        run: |
          export GITHUB_REF="refs/heads/${TARGET_REF}"
          export GITHUB_REF_NAME="${TARGET_REF}"
          echo "Releasing from branch: ${GITHUB_REF_NAME} (GITHUB_REF=${GITHUB_REF})"
          npx semantic-release

      - name: Update floating major tag
        if: inputs.ref == 'main'
        shell: bash
        env:
          TARGET_REF: ${{ inputs.ref }}
        # After a stable release on main, move `v<major>` to point at the
        # latest non-prerelease tag. Consumers can then pin composites
        # with `@v1` and always resolve to the latest 1.x.x release.
        # Runs only when the triggering branch is main, so alpha/beta
        # releases on dev/stg never move the floating major tag.
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          LATEST_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -Ev -- '-(alpha|beta|rc)\.' \
            | sort -V \
            | tail -n1 || true)

          if [ -z "$LATEST_STABLE" ]; then
            echo "No stable tag found; skipping floating major tag update."
            exit 0
          fi

          MAJOR="${LATEST_STABLE%%.*}"
          TARGET_SHA=$(git rev-list -n1 "$LATEST_STABLE")

          CURRENT_SHA=$(git rev-parse -q --verify "refs/tags/${MAJOR}" || true)
          if [ "$CURRENT_SHA" = "$TARGET_SHA" ]; then
            echo "Floating tag ${MAJOR} already at ${TARGET_SHA}; nothing to do."
            exit 0
          fi

          echo "Updating ${MAJOR} -> ${LATEST_STABLE} (${TARGET_SHA})"
          git tag -f "$MAJOR" "$TARGET_SHA"
          git push --force origin "refs/tags/${MAJOR}"
