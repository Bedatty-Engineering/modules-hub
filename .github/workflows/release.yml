name: Release [Reusable]

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or ref to release from"
        required: true
        type: string
    secrets:
      RELEASE_TOKEN:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Materialize local release branches
        shell: bash
        env:
          TARGET_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          # semantic-release iterates over every branch declared in
          # .releaserc.json running `git tag --merged <name>`, which requires
          # a local ref. actions/checkout only materializes the target branch;
          # create locals for every OTHER release branch that exists on
          # origin. The currently checked-out branch is skipped because
          # `git branch -f` refuses to update the branch in use by the worktree.
          for b in main dev stg prd; do
            if [ "$b" = "$TARGET_REF" ]; then
              continue
            fi
            if git show-ref --verify --quiet "refs/remotes/origin/$b"; then
              git branch -f "$b" "origin/$b"
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup GPG signing
        uses: Bedatty-Engineering/modules-hub/composite/config/setup-gpg@dev
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_identity_token: ${{ secrets.RELEASE_TOKEN }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
