name: Release [Reusable]

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or ref to release from"
        required: true
        type: string
    secrets:
      RELEASE_TOKEN:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Materialize release branches
        uses: Bedatty-Engineering/modules-hub/composite/config/materialize-release-branches@dev
        with:
          current_ref: ${{ inputs.ref }}

      - name: Setup GPG signing
        uses: Bedatty-Engineering/modules-hub/composite/config/setup-gpg@dev
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_identity_token: ${{ secrets.RELEASE_TOKEN }}

      - name: Semantic release
        uses: Bedatty-Engineering/modules-hub/composite/config/semantic-release@dev
        with:
          target_ref: ${{ inputs.ref }}
          stable_ref: main
          github_token: ${{ secrets.RELEASE_TOKEN }}

      - name: Update floating major tag
        if: inputs.ref == 'main'
        uses: Bedatty-Engineering/modules-hub/composite/config/update-floating-major-tag@dev
