name: Validate [Reusable]

# Generic validation reusable workflow. Safe to call from any repository:
# runs commit-message lint, GitHub workflow lint, and YAML lint on the
# changed files. Repo-specific checks live in companion reusables (e.g.
# `validate-modules-hub.yml`).

on:
  workflow_call:
    inputs:
      is_pull_request:
        description: "Whether the trigger was a pull_request event"
        type: boolean
        required: true

jobs:
  # ----------------- Commit Lint (PR only) -----------------
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: inputs.is_pull_request
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: Bedatty-Engineering/modules-hub/composite/hub/commitlint@v1
        with:
          pr-base-sha: ${{ github.event.pull_request.base.sha }}
          pr-head-sha: ${{ github.event.pull_request.head.sha }}

  # ----------------- Workflow Lint -----------------
  actionlint:
    name: Lint GitHub workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint GitHub workflows
        uses: Bedatty-Engineering/modules-hub/composite/hub/actionlint@v1

  # ----------------- Changed Files Detection -----------------
  # Runs on every trigger so downstream lint jobs can scope to the diff.
  # On push events tj-actions/changed-files falls back to comparing
  # against HEAD~1, which is good enough for most CI runs.
  changed-files:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      yaml_files: ${{ steps.detect.outputs.yaml_all }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            yaml_all:
              - '**/*.yml'
              - '**/*.yaml'
          dir_names: false

      - name: Summarize detection
        run: |
          echo "yaml_all=${{ steps.detect.outputs.yaml_all }}"

  # ----------------- YAML Lint -----------------
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.yaml_files != ''
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yamllint
        run: pip install --user yamllint==1.35.1

      - name: Lint changed YAML files
        env:
          FILES: ${{ needs.changed-files.outputs.yaml_files }}
        run: |
          set -euo pipefail
          # FILES is a space-separated list from tj-actions/changed-files;
          # word splitting is intentional here.
          # shellcheck disable=SC2086
          yamllint -d relaxed $FILES
