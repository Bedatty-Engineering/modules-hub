name: Validate [Reusable]

on:
  workflow_call:
    inputs:
      is_pull_request:
        description: "Whether the trigger was a pull_request event"
        type: boolean
        required: true

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: inputs.is_pull_request
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: Bedatty-Engineering/modules-hub/composite/hub/commitlint@dev
        with:
          pr-base-sha: ${{ github.event.pull_request.base.sha }}
          pr-head-sha: ${{ github.event.pull_request.head.sha }}

  validate-actions:
    name: Validate workflow & action metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ----------------- Lint -----------------
      - name: Lint GitHub workflows
        uses: Bedatty-Engineering/modules-hub/composite/hub/actionlint@dev

      # ----------------- Verify -----------------
      - name: Verify release config
        run: |
          set -euo pipefail
          test -f .releaserc.json   || { echo "Missing .releaserc.json"; exit 1; }
          test -f package.json      || { echo "Missing package.json"; exit 1; }
          test -f package-lock.json || { echo "Missing package-lock.json"; exit 1; }
          echo "Release config files present."
