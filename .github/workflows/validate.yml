name: Validate [Reusable]

# Base validation reusable workflow. Safe to call from any repository.
# Two layers run alongside the code-hygiene jobs:
#   - blocking-checks (PR only): title, description, optional source-branch
#   - advisory-checks (PR only): size labeling, auto-labeling
# Followed by pr-summary that posts a sticky comment.

on:
  workflow_call:
    inputs:
      is_pull_request:
        description: "Whether the trigger was a pull_request event."
        type: boolean
        required: true

      # ----- PR title -----
      pr_title_types:
        description: Allowed Conventional Commit types. Newline- or pipe-separated.
        type: string
        default: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          chore
          ci
          build
          revert
      pr_title_scopes:
        description: Allowed scopes. Empty means any scope is allowed.
        type: string
        default: ""
      require_scope:
        description: Require a scope in the PR title.
        type: boolean
        default: false

      # ----- PR description -----
      pr_description_min_length:
        description: Minimum meaningful chars in the PR body.
        type: string
        default: "20"

      # ----- Source branch -----
      enforce_source_branches:
        description: Enforce allowed source branches when targeting a protected branch.
        type: boolean
        default: false
      allowed_source_branches:
        description: Allowed sources. Pipe- or newline-separated; supports trailing `*`.
        type: string
        default: "dev|hotfix/*"
      target_branches_for_source_check:
        description: Protected target branches that require source validation.
        type: string
        default: "main"

      # ----- PR size -----
      enable_pr_size_check:
        description: Run the size labeling step.
        type: boolean
        default: true
      pr_size_fail_on_xl:
        description: Fail the advisory job when the PR lands in the XL bucket.
        type: boolean
        default: false

      # ----- Auto-labeler -----
      enable_auto_labeler:
        description: Run the auto-labeler step. Requires a labeler config file.
        type: boolean
        default: false
      labeler_config_path:
        description: Path to the labeler config file inside the repo.
        type: string
        default: ".github/labeler.yml"

      # ----- Assignee -----
      enable_pr_assignee:
        description: Auto-assign the PR to its author.
        type: boolean
        default: true
      pr_assignee_override:
        description: >
          Optional comma-separated logins to assign instead of (or in
          addition to) the PR author. Leave empty to default to the
          author.
        type: string
        default: ""

      # ----- Summary -----
      enable_summary_comment:
        description: Post / update a sticky summary comment on the PR.
        type: boolean
        default: true

    secrets:
      repository_operator:
        description: >
          Optional PAT used by steps that write to the PR (labels,
          assignees, sticky comment). When provided, GitHub attributes
          those actions to the token's owner instead of github-actions[bot].
          Falls back to the workflow's GITHUB_TOKEN when absent.
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write
  packages: read
  actions: read

jobs:
  # ----------------- Commit Lint (PR only) -----------------
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: inputs.is_pull_request
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: Bedatty-Engineering/modules-hub/composite/hub/commitlint@feat/pr-assignee
        with:
          pr-base-sha: ${{ github.event.pull_request.base.sha }}
          pr-head-sha: ${{ github.event.pull_request.head.sha }}

  # ----------------- Workflow Lint -----------------
  actionlint:
    name: Lint GitHub workflows
    runs-on: ubuntu-latest
    needs: [commitlint, blocking-checks]
    if: always() && (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped') && (needs.blocking-checks.result == 'success' || needs.blocking-checks.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint GitHub workflows
        uses: Bedatty-Engineering/modules-hub/composite/hub/actionlint@feat/pr-assignee

  # ----------------- Changed Files Detection -----------------
  changed-files:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      yaml_files: ${{ steps.detect.outputs.yaml_all }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            yaml_all:
              - '**/*.yml'
              - '**/*.yaml'
          dir_names: false

      - name: Summarize detection
        run: |
          echo "yaml_all=${{ steps.detect.outputs.yaml_all }}"

  # ----------------- YAML Lint -----------------
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    needs: [commitlint, blocking-checks, changed-files]
    if: |
      always()
      && (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
      && (needs.blocking-checks.result == 'success' || needs.blocking-checks.result == 'skipped')
      && needs.changed-files.outputs.yaml_files != ''
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yamllint
        run: pip install --user yamllint==1.35.1

      - name: Lint changed YAML files
        env:
          FILES: ${{ needs.changed-files.outputs.yaml_files }}
        run: |
          set -euo pipefail
          # FILES is a space-separated list; word splitting is intentional.
          # shellcheck disable=SC2086
          yamllint -d relaxed $FILES

  # ----------------- Tier 1: Blocking Checks (PR only) -----------------
  blocking-checks:
    name: Blocking checks
    runs-on: ubuntu-latest
    if: inputs.is_pull_request && github.event.pull_request.draft != true
    outputs:
      title-result: ${{ steps.collect.outputs.title }}
      title-message: ${{ steps.title.outputs.message }}
      description-result: ${{ steps.collect.outputs.description }}
      description-message: ${{ steps.description.outputs.message }}
      source-branch-result: ${{ steps.collect.outputs.source }}
      source-branch-message: ${{ steps.source.outputs.message }}
    steps:
      - name: Validate PR title
        id: title
        continue-on-error: true
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-title@feat/pr-assignee
        with:
          types: ${{ inputs.pr_title_types }}
          scopes: ${{ inputs.pr_title_scopes }}
          require-scope: ${{ inputs.require_scope && 'true' || 'false' }}

      - name: Validate PR description
        id: description
        continue-on-error: true
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-description@feat/pr-assignee
        with:
          min-length: ${{ inputs.pr_description_min_length }}

      - name: Validate source branch
        id: source
        if: inputs.enforce_source_branches
        continue-on-error: true
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-source-branch@feat/pr-assignee
        with:
          allowed-branches: ${{ inputs.allowed_source_branches }}
          target-branches: ${{ inputs.target_branches_for_source_check }}

      - name: Collect and enforce blocking
        id: collect
        run: |
          set -euo pipefail
          title="${{ steps.title.outcome }}"
          description="${{ steps.description.outcome }}"
          source="${{ steps.source.outcome || 'skipped' }}"
          {
            echo "title=$title"
            echo "description=$description"
            echo "source=$source"
          } >> "$GITHUB_OUTPUT"
          fail=0
          for r in "$title" "$description" "$source"; do
            [ "$r" = "failure" ] && fail=1
          done
          if [ "$fail" -eq 1 ]; then
            echo "::error::One or more blocking checks failed (title=$title description=$description source=$source)"
            exit 1
          fi
          echo "All blocking checks passed."

  # ----------------- Tier 2: Advisory Checks (PR only) -----------------
  advisory-checks:
    name: Advisory checks
    runs-on: ubuntu-latest
    needs: [commitlint, blocking-checks]
    if: |
      needs.commitlint.result == 'success'
      && needs.blocking-checks.result == 'success'
      && inputs.is_pull_request
      && github.event.pull_request.draft != true
    outputs:
      size-result: ${{ steps.collect.outputs.size }}
      size-message: ${{ steps.size.outputs.message }}
      label-result: ${{ steps.collect.outputs.label }}
      label-message: ${{ steps.labels.outputs.message }}
      assignee-result: ${{ steps.collect.outputs.assignee }}
      assignee-message: ${{ steps.assignee.outputs.message }}
    steps:
      - name: Check PR size
        id: size
        if: inputs.enable_pr_size_check
        continue-on-error: true
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-size@feat/pr-assignee
        with:
          github-token: ${{ secrets.repository_operator || github.token }}
          fail-on-xl: ${{ inputs.pr_size_fail_on_xl && 'true' || 'false' }}

      - name: Auto-label PR
        id: labels
        if: inputs.enable_auto_labeler
        continue-on-error: true
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-labels@feat/pr-assignee
        with:
          github-token: ${{ secrets.repository_operator || github.token }}
          config-path: ${{ inputs.labeler_config_path }}

      - name: Auto-assign PR
        id: assignee
        if: inputs.enable_pr_assignee
        continue-on-error: true
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-assignee@feat/pr-assignee
        with:
          github-token: ${{ secrets.repository_operator || github.token }}
          assignee: ${{ inputs.pr_assignee_override != '' && inputs.pr_assignee_override || github.event.pull_request.user.login }}

      - name: Collect results
        id: collect
        run: |
          {
            echo "size=${{ steps.size.outcome || 'skipped' }}"
            echo "label=${{ steps.labels.outcome || 'skipped' }}"
            echo "assignee=${{ steps.assignee.outcome || 'skipped' }}"
          } >> "$GITHUB_OUTPUT"

  # ----------------- Tier 3: CodeQL (heavy, gated on Tier 1) -----------------
  codeql:
    name: CodeQL
    needs: [actionlint, yamllint]
    if: |
      always()
      && needs.actionlint.result == 'success'
      && (needs.yamllint.result == 'success' || needs.yamllint.result == 'skipped')
    uses: Bedatty-Engineering/modules-hub/.github/workflows/codeql.yml@feat/pr-assignee

  # ----------------- Summary Comment (PR only) -----------------
  pr-summary:
    name: PR summary
    runs-on: ubuntu-latest
    needs: [blocking-checks, advisory-checks]
    if: always() && inputs.is_pull_request && inputs.enable_summary_comment && github.event.pull_request.draft != true
    steps:
      - name: Post summary
        uses: Bedatty-Engineering/modules-hub/composite/hub/pr-summary@feat/pr-assignee
        with:
          github-token: ${{ secrets.repository_operator || github.token }}
          title-result: ${{ needs.blocking-checks.outputs.title-result || 'skipped' }}
          title-message: ${{ needs.blocking-checks.outputs.title-message }}
          description-result: ${{ needs.blocking-checks.outputs.description-result || 'skipped' }}
          description-message: ${{ needs.blocking-checks.outputs.description-message }}
          source-branch-result: ${{ needs.blocking-checks.outputs.source-branch-result || 'skipped' }}
          source-branch-message: ${{ needs.blocking-checks.outputs.source-branch-message }}
          size-result: ${{ needs.advisory-checks.outputs.size-result || 'skipped' }}
          size-message: ${{ needs.advisory-checks.outputs.size-message }}
          label-result: ${{ needs.advisory-checks.outputs.label-result || 'skipped' }}
          label-message: ${{ needs.advisory-checks.outputs.label-message }}
          assignee-result: ${{ needs.advisory-checks.outputs.assignee-result || 'skipped' }}
          assignee-message: ${{ needs.advisory-checks.outputs.assignee-message }}
