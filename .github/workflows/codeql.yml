name: CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: >
          JSON array of CodeQL languages to analyze. Defaults to both
          `actions` and `javascript-typescript`. Callers should narrow
          this set when only a subset of file types changed.
        type: string
        required: false
        default: '["actions","javascript-typescript"]'
  schedule:
    - cron: '39 20 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # On workflow_call the caller passes a narrowed JSON array; on
        # schedule / workflow_dispatch the default kicks in and scans both.
        language: ${{ fromJSON(inputs.languages || '["actions","javascript-typescript"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4 (codeql-bundle-v2.25.2)
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4 (codeql-bundle-v2.25.2)
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: never

      # Suppress `actions/unpinned-tag` for first-party composites pinned
      # to a floating major tag (e.g. Bedatty-Engineering/modules-hub/
      # composite/...@v1). The rule stays active for every other action,
      # so external dependencies still must be SHA-pinned.
      - name: Strip first-party unpinned-tag findings
        if: matrix.language == 'actions'
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(codeql-results/*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No SARIF files produced; nothing to filter."
            exit 0
          fi
          for sarif in "${files[@]}"; do
            jq '(.runs[].results) |= map(select(
                  (.ruleId != "actions/unpinned-tag") or
                  ((.message.text // "")
                    | test("Bedatty-Engineering/modules-hub/composite/")
                    | not)
                ))' "$sarif" > "$sarif.tmp"
            mv "$sarif.tmp" "$sarif"
            echo "Filtered $sarif"
          done

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4 (codeql-bundle-v2.25.2)
        with:
          sarif_file: codeql-results
          category: "/language:${{ matrix.language }}"
