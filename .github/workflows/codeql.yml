# yamllint disable rule:line-length
name: CodeQL [Reusable]

on:
  workflow_call:
    inputs:
      languages:
        description: >
          JSON array of CodeQL languages to analyze. Defaults to both
          `actions` and `javascript-typescript`. Callers should narrow
          this set when only a subset of file types changed.
        type: string
        required: false
        default: '["actions","javascript-typescript"]'
      queries:
        description: "CodeQL query suite or query pack list to run."
        type: string
        required: false
        default: security-extended
      upload_sarif:
        description: "Upload the generated SARIF results to code scanning."
        type: boolean
        required: false
        default: true
      filter_first_party_unpinned_tags:
        description: >
          Suppress actions/unpinned-tag findings for first-party modules-hub
          composite actions pinned to floating major tags.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Callers can pass a narrowed JSON array; scheduled runs should be
        # configured in the caller workflow.
        language: >-
          ${{ fromJSON(inputs.languages || '["actions","javascript-typescript"]') }}
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        # v4 (codeql-bundle-v2.25.2)
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries || 'security-extended' }}

      - name: Perform CodeQL Analysis
        # v4 (codeql-bundle-v2.25.2)
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: never

      - name: Strip first-party unpinned-tag findings
        if: >-
          matrix.language == 'actions'
          && inputs.filter_first_party_unpinned_tags != false
        uses: Bedatty-Engineering/modules-hub/composite/hub/filter-codeql-sarif@v1
        with:
          sarif-directory: codeql-results

      - name: Upload SARIF
        if: inputs.upload_sarif != false
        # v4 (codeql-bundle-v2.25.2)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: codeql-results
          category: "/language:${{ matrix.language }}"
