name: Validate

on:
  pull_request:
    branches: [main, dev, stg]

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write
  packages: read
  actions: read

jobs:
  base:
    name: Base validation
    uses: ./.github/workflows/validate.yml
    secrets: inherit
    with:
      is_pull_request: ${{ github.event_name == 'pull_request' }}
      pr_title_scopes: |
        terraform
        config
        hub
        modules
        release
        deps
        docs
      enforce_source_branches: true
      allowed_source_branches: "dev|hotfix/*"
      target_branches_for_source_check: "main"
      enable_auto_labeler: true
      labeler_config_path: ".github/labeler.yml"

  modules-hub:
    name: modules-hub checks
    uses: ./.github/workflows/validate-modules-hub.yml

  pr-findings:
    name: PR findings
    runs-on: ubuntu-latest
    needs: [base, modules-hub]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.event.pull_request.draft != true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Update findings
        uses: ./composite/hub/pr-summary
        with:
          github-token: ${{ secrets.REPOSITORY_OPERATOR || github.token }}
          findings-only: "true"
