name: Validate

on:
  pull_request:
    branches: [main, dev, stg]

permissions:
  contents: read
  pull-requests: write

jobs:
  base:
    name: Base validation
    uses: ./.github/workflows/validate.yml
    with:
      is_pull_request: ${{ github.event_name == 'pull_request' }}
      pr_title_scopes: |
        terraform
        config
        hub
        modules
        release
        deps
        docs
      enforce_source_branches: true
      allowed_source_branches: "dev|hotfix/*"
      target_branches_for_source_check: "main"
      enable_auto_labeler: true
      labeler_config_path: ".github/labeler.yml"

  modules-hub:
    name: modules-hub checks
    uses: ./.github/workflows/validate-modules-hub.yml
