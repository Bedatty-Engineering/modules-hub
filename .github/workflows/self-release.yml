name: Release

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [main, dev, stg]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/release.yml
    with:
      ref: ${{ github.event.workflow_run.head_branch }}
    secrets: inherit
