name: Release

# Runs after CI passes on main — creates a GitHub Release and git tag via
# semantic-release, which drives versioned references in consumer repos:
#   uses: <org>/modules-hub/.github/workflows/terraform/plan.yml@v1.2.3
#   uses: <org>/modules-hub/composite/terraform/detect-stacks@v1.2.3

on:
  workflow_run:
    workflows: ["CI (hub repo)"]
    types: [completed]
    branches: [main]

permissions:
  contents: write      # push CHANGELOG.md commit + git tag
  issues: write        # comment on issues for release notes
  pull-requests: write # comment on PRs for release notes

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history required by semantic-release
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
