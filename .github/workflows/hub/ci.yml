name: CI (hub repo)

# Validates this repository only — not part of the Terraform reusable pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to   ${{ github.event.pull_request.head.sha }} \
            --verbose

  validate-actions:
    name: Validate workflow & action metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- 1.7.4
          sudo mv actionlint /usr/local/bin/

      - name: Lint GitHub workflows
        run: actionlint -color

      - name: Verify Terraform composite action.yml files exist
        run: |
          set -euo pipefail
          BASE=composite/terraform
          for d in \
            detect-stacks mask-secrets setup \
            verify-tfc-token init-make validate-make \
            plan-make apply-make \
            post-plan-comment report-apply-failure \
            plan apply destroy; do
            test -f "$BASE/$d/action.yml" || { echo "Missing $BASE/$d/action.yml"; exit 1; }
          done
          echo "All Terraform composite action.yml files present."

      - name: Verify release config
        run: |
          set -euo pipefail
          test -f .releaserc.json  || { echo "Missing .releaserc.json"; exit 1; }
          test -f package.json     || { echo "Missing package.json"; exit 1; }
          test -f package-lock.json || { echo "Missing package-lock.json"; exit 1; }
          echo "Release config files present."
